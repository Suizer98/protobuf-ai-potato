services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: potato
      POSTGRES_PASSWORD: potato
      POSTGRES_DB: potato
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U potato -d potato"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  chat:
    build: .
    image: protobuf-ai-potato-chat:local
    ports:
      - "${GRPC_PORT:-50051}:50051"
    environment:
      GRPC_ADDR: ":50051"
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      DATABASE_URL: ${DATABASE_URL:-postgres://potato:potato@postgres:5432/potato?sslmode=disable}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      RAG_TOP_K: ${RAG_TOP_K:-4}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/grpc_health_probe", "-addr=:50051"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # Browser UI for gRPC (Swagger-like). Open http://localhost:8080
  grpcui:
    build:
      context: .
      dockerfile: Dockerfile.grpcui
    image: protobuf-ai-potato-grpcui:local
    ports:
      - "${GRPCUI_PORT:-8080}:8080"
    depends_on:
      chat:
        condition: service_healthy
    restart: unless-stopped

  # Enable later for shared session history across replicas:
  # docker compose --profile scale up
  redis:
    image: redis:7-alpine
    profiles: ["scale"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  pgdata:
  redis-data:
